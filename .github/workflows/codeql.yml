name: CodeQL

# Static analysis for security vulnerabilities in dotMD's own Python code.
# Complements Dependabot, which covers dependency updates.

on:
  push:
    branches: [main, milestone/v1.8-standalone-surrealdb-cutover]
  pull_request:
    branches: [main, milestone/v1.8-standalone-surrealdb-cutover]
  schedule:
    - cron: "27 7 * * 1"

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
